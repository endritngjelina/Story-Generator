<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mad Libs Story Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #ff6b6b, #ffa726);
            color: white;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.1); opacity: 0.1; }
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        .main-content {
            padding: 40px 30px;
        }

        .template-selector {
            margin-bottom: 30px;
            text-align: center;
        }

        .template-selector h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .template-buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .template-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        .template-btn.fantasy {
            background: linear-gradient(135deg, #a8edea, #fed6e3);
            color: #2d3436;
        }

        .template-btn.scifi {
            background: linear-gradient(135deg, #74b9ff, #0984e3);
            color: white;
        }

        .template-btn.mystery {
            background: linear-gradient(135deg, #fd79a8, #fdcb6e);
            color: #2d3436;
        }

        .template-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        .template-btn.active {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .form-section {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }

        .form-section:hover {
            border-color: #667eea;
            transform: translateY(-2px);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 0.95em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input {
            padding: 12px 16px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s ease;
            background: white;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            transform: translateY(-1px);
        }

        .input-group.error input {
            border-color: #ff6b6b;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .error-message {
            color: #ff6b6b;
            font-size: 0.8em;
            margin-top: 5px;
            display: none;
        }

        .input-group.error .error-message {
            display: block;
        }

        .generate-btn {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 30px;
            font-size: 1.2em;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin: 30px auto;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0, 184, 148, 0.4);
        }

        .generate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .story-section {
            background: linear-gradient(135deg, #ffecd2, #fcb69f);
            border-radius: 15px;
            padding: 30px;
            margin-top: 30px;
            display: none;
            position: relative;
            overflow: hidden;
        }

        .story-section.show {
            display: block;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .story-content {
            background: white;
            border-radius: 10px;
            padding: 25px;
            font-size: 1.1em;
            line-height: 1.8;
            color: #333;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            position: relative;
            z-index: 1;
        }

        .story-actions {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .download-btn {
            background: #6c5ce7;
            color: white;
        }

        .copy-btn {
            background: #fd79a8;
            color: white;
        }

        .speak-btn {
            background: #00b894;
            color: white;
        }

        .new-story-btn {
            background: #ff7675;
            color: white;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .hidden {
            display: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #00b894;
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            transform: translateX(400px);
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(0);
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 15px;
            }
            
            .header {
                padding: 30px 20px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .main-content {
                padding: 30px 20px;
            }
            
            .template-buttons {
                flex-direction: column;
                align-items: center;
            }
            
            .template-btn {
                width: 100%;
                max-width: 200px;
            }
            
            .form-grid {
                grid-template-columns: 1fr;
            }
            
            .story-actions {
                flex-direction: column;
                align-items: center;
            }
            
            .action-btn {
                width: 100%;
                max-width: 200px;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎭 Mad Libs Story Generator</h1>
            <p>Create hilarious stories with your own words!</p>
        </div>

        <div class="main-content">
            <div class="template-selector">
                <h2>Choose Your Adventure</h2>
                <div class="template-buttons">
                    <button class="template-btn fantasy active" data-template="fantasy">
                        🏰 Fantasy
                    </button>
                    <button class="template-btn scifi" data-template="scifi">
                        🚀 Sci-Fi
                    </button>
                    <button class="template-btn mystery" data-template="mystery">
                        🔍 Mystery
                    </button>
                </div>
            </div>

            <div class="form-section">
                <h3 id="form-title">Fantasy Adventure Words</h3>
                <form id="mad-libs-form">
                    <div class="form-grid" id="form-grid">
                        <!-- Dynamic form fields will be inserted here -->
                    </div>
                    <button type="submit" class="generate-btn" id="generate-btn">
                        Generate Story
                    </button>
                </form>
            </div>

            <div class="story-section" id="story-section">
                <div class="story-content" id="story-content">
                    <!-- Generated story will appear here -->
                </div>
                <div class="story-actions">
                    <button class="action-btn download-btn" id="download-btn">
                        💾 Download Story
                    </button>
                    <button class="action-btn copy-btn" id="copy-btn">
                        📋 Copy to Clipboard
                    </button>
                    <button class="action-btn speak-btn" id="speak-btn">
                        🔊 Read Aloud
                    </button>
                    <button class="action-btn new-story-btn" id="new-story-btn">
                        ✨ New Story
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Story templates and word requirements
        const storyTemplates = {
            fantasy: {
                title: "Fantasy Adventure Words",
                fields: [
                    { name: "heroName", label: "Hero's Name", type: "text" },
                    { name: "adjective1", label: "Adjective", type: "text" },
                    { name: "creature", label: "Magical Creature", type: "text" },
                    { name: "place", label: "Mysterious Place", type: "text" },
                    { name: "weapon", label: "Weapon", type: "text" },
                    { name: "adjective2", label: "Scary Adjective", type: "text" },
                    { name: "villain", label: "Villain's Name", type: "text" },
                    { name: "power", label: "Magical Power", type: "text" },
                    { name: "treasure", label: "Treasure", type: "text" },
                    { name: "emotion", label: "Emotion", type: "text" }
                ],
                template: `Once upon a time, there was a {adjective1} hero named {heroName} who lived in the mystical land of {place}. One day, while exploring the ancient forest, {heroName} encountered a {creature} that was guarding a {adjective2} cave.

Armed with a magical {weapon}, {heroName} bravely entered the cave to face the evil {villain}. The villain possessed the power of {power} and had stolen the legendary {treasure} from the kingdom.

After an epic battle, {heroName} defeated the {villain} and retrieved the {treasure}. The kingdom was saved, and {heroName} felt incredibly {emotion}. The {creature} became {heroName}'s loyal companion, and they lived happily ever after, protecting the realm from future threats.`
            },
            scifi: {
                title: "Sci-Fi Adventure Words",
                fields: [
                    { name: "captainName", label: "Captain's Name", type: "text" },
                    { name: "planet", label: "Alien Planet", type: "text" },
                    { name: "technology", label: "Futuristic Technology", type: "text" },
                    { name: "alienSpecies", label: "Alien Species", type: "text" },
                    { name: "adjective1", label: "Descriptive Adjective", type: "text" },
                    { name: "spaceShip", label: "Spaceship Name", type: "text" },
                    { name: "weapon", label: "Laser Weapon", type: "text" },
                    { name: "mineral", label: "Rare Mineral", type: "text" },
                    { name: "number", label: "Large Number", type: "number" },
                    { name: "adjective2", label: "Exciting Adjective", type: "text" }
                ],
                template: `Captain {captainName} piloted the starship {spaceShip} through the vast cosmos, heading toward the {adjective1} planet {planet}. The mission: to discover deposits of {mineral}, the rarest substance in the galaxy.

Upon landing, the crew encountered the {alienSpecies}, a highly intelligent species that had developed {technology} far beyond human comprehension. These aliens were {adjective2} but initially suspicious of the human visitors.

Using their {weapon}, the crew had to defend themselves when space pirates attacked, trying to steal their {mineral} samples. After {number} hours of intense battle, Captain {captainName} successfully negotiated peace with the {alienSpecies} and established the first intergalactic trade agreement.

The mission was a success, and humanity took its first step toward becoming a truly spacefaring civilization.`
            },
            mystery: {
                title: "Mystery Story Words",
                fields: [
                    { name: "detectiveName", label: "Detective's Name", type: "text" },
                    { name: "location", label: "Mysterious Location", type: "text" },
                    { name: "victim", label: "Victim's Name", type: "text" },
                    { name: "clue", label: "Important Clue", type: "text" },
                    { name: "suspect", label: "Suspect's Name", type: "text" },
                    { name: "adjective1", label: "Suspicious Adjective", type: "text" },
                    { name: "object", label: "Mysterious Object", type: "text" },
                    { name: "motive", label: "Motive", type: "text" },
                    { name: "adjective2", label: "Dramatic Adjective", type: "text" },
                    { name: "timeOfDay", label: "Time of Day", type: "text" }
                ],
                template: `Detective {detectiveName} arrived at the {location} on a {adjective2} {timeOfDay}. The case involved the mysterious disappearance of {victim}, a wealthy collector known for their {adjective1} behavior.

The only clue left behind was a {clue} found near a {object} in the victim's study. Detective {detectiveName} immediately suspected {suspect}, who had a clear motive: {motive}.

After hours of investigation, interviewing witnesses, and analyzing evidence, the detective discovered that the {object} was actually a secret key to a hidden vault. The case took a shocking turn when it was revealed that {victim} had been planning their own disappearance all along!

In a {adjective2} confrontation, Detective {detectiveName} solved the case and brought justice to light. The {suspect} was cleared of all charges, and {victim} was found safe but facing charges for insurance fraud.`
            }
        };

        // Application state
        let currentTemplate = 'fantasy';
        let currentStory = '';
        let speechSynthesis = window.speechSynthesis;

        // DOM elements
        const templateButtons = document.querySelectorAll('.template-btn');
        const formTitle = document.getElementById('form-title');
        const formGrid = document.getElementById('form-grid');
        const madLibsForm = document.getElementById('mad-libs-form');
        const generateBtn = document.getElementById('generate-btn');
        const storySection = document.getElementById('story-section');
        const storyContent = document.getElementById('story-content');
        const downloadBtn = document.getElementById('download-btn');
        const copyBtn = document.getElementById('copy-btn');
        const speakBtn = document.getElementById('speak-btn');
        const newStoryBtn = document.getElementById('new-story-btn');

        // Initialize the app
        function init() {
            setupEventListeners();
            loadTemplate(currentTemplate);
        }

        // Setup event listeners
        function setupEventListeners() {
            templateButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const template = btn.dataset.template;
                    selectTemplate(template);
                });
            });

            madLibsForm.addEventListener('submit', handleFormSubmit);
            downloadBtn.addEventListener('click', downloadStory);
            copyBtn.addEventListener('click', copyStory);
            speakBtn.addEventListener('click', speakStory);
            newStoryBtn.addEventListener('click', resetForm);
        }

        // Select template
        function selectTemplate(templateName) {
            currentTemplate = templateName;
            
            // Update button states
            templateButtons.forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-template="${templateName}"]`).classList.add('active');
            
            // Load template
            loadTemplate(templateName);
            
            // Hide story section
            storySection.classList.remove('show');
        }

        // Load template form
        function loadTemplate(templateName) {
            const template = storyTemplates[templateName];
            formTitle.textContent = template.title;
            
            // Clear existing form
            formGrid.innerHTML = '';
            
            // Generate form fields
            template.fields.forEach(field => {
                const inputGroup = document.createElement('div');
                inputGroup.className = 'input-group';
                
                inputGroup.innerHTML = `
                    <label for="${field.name}">${field.label}</label>
                    <input 
                        type="${field.type}" 
                        id="${field.name}" 
                        name="${field.name}" 
                        required
                    >
                    <span class="error-message">This field is required</span>
                `;
                
                formGrid.appendChild(inputGroup);
            });
        }

        // Handle form submission
        function handleFormSubmit(e) {
            e.preventDefault();
            
            // Clear previous errors
            document.querySelectorAll('.input-group').forEach(group => {
                group.classList.remove('error');
            });
            
            // Validate form
            const formData = new FormData(madLibsForm);
            const values = {};
            let isValid = true;
            
            // Check each field
            storyTemplates[currentTemplate].fields.forEach(field => {
                const value = formData.get(field.name);
                if (!value || value.trim() === '') {
                    document.querySelector(`[name="${field.name}"]`).closest('.input-group').classList.add('error');
                    isValid = false;
                } else {
                    values[field.name] = value.trim();
                }
            });
            
            if (!isValid) {
                showToast('Please fill in all fields!', 'error');
                return;
            }
            
            // Generate story
            generateStory(values);
        }

        // Generate story
        function generateStory(values) {
            // Show loading state
            generateBtn.innerHTML = '<span class="loading"></span> Generating...';
            generateBtn.disabled = true;
            
            setTimeout(() => {
                const template = storyTemplates[currentTemplate].template;
                
                // Replace placeholders with values
                currentStory = template.replace(/{(\w+)}/g, (match, key) => {
                    return values[key] || match;
                });
                
                // Display story
                storyContent.innerHTML = currentStory.replace(/\n/g, '<br><br>');
                storySection.classList.add('show');
                
                // Reset button
                generateBtn.innerHTML = 'Generate Story';
                generateBtn.disabled = false;
                
                // Scroll to story
                storySection.scrollIntoView({ behavior: 'smooth' });
                
                showToast('Story generated successfully!', 'success');
            }, 1000);
        }

        // Download story
        function downloadStory() {
            const blob = new Blob([currentStory], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `mad-libs-${currentTemplate}-story.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showToast('Story downloaded!', 'success');
        }

        // Copy story to clipboard
        async function copyStory() {
            try {
                await navigator.clipboard.writeText(currentStory);
                showToast('Story copied to clipboard!', 'success');
            } catch (err) {
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = currentStory;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast('Story copied to clipboard!', 'success');
            }
        }

        // Speak story aloud
        function speakStory() {
            if (speechSynthesis.speaking) {
                speechSynthesis.cancel();
                speakBtn.innerHTML = '🔊 Read Aloud';
                return;
            }
            
            const utterance = new SpeechSynthesisUtterance(currentStory);
            utterance.rate = 0.8;
            utterance.pitch = 1;
            utterance.volume = 1;
            
            utterance.onstart = () => {
                speakBtn.innerHTML = '⏸️ Stop Reading';
            };
            
            utterance.onend = () => {
                speakBtn.innerHTML = '🔊 Read Aloud';
            };
            
            speechSynthesis.speak(utterance);
        }

        // Reset form
        function resetForm() {
            madLibsForm.reset();
            storySection.classList.remove('show');
            document.querySelectorAll('.input-group').forEach(group => {
                group.classList.remove('error');
            });
            
            // Scroll to top
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Show toast notification
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.classList.add('show');
            }, 100);
            
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);
        }

        // Initialize the app when DOM is loaded
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
